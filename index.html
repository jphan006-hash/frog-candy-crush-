<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐸 Frog Candy Crush ULTRA</title>
<style>
body {font-family:Arial;background:linear-gradient(#a8e6cf,#56c596);text-align:center;}
.grid {display:grid;grid-template-columns:repeat(6,60px);gap:8px;justify-content:center;}
.tile {width:60px;height:60px;font-size:26px;display:flex;align-items:center;justify-content:center;background:white;border-radius:12px;cursor:pointer;transition:.2s;}
.tile.selected{background:#b2f2bb;transform:scale(1.1);} 
.tile.bomb{background:#ff8787;} 
.tile.laugh{animation:shake .3s;}
.tile.hug{background:#ffd6e0;transform:scale(1.2);} 

@keyframes shake{
0%{transform:translateX(0);} 
25%{transform:translateX(-3px);} 
50%{transform:translateX(3px);} 
75%{transform:translateX(-3px);} 
100%{transform:translateX(0);} }

#topbar{margin-bottom:10px;} button{padding:8px;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>

<h1>🐸 Frog Candy Crush ULTRA 🐸</h1>
<div id="topbar">
Score: <span id="score">0</span> |
Level: <span id="level">1</span> |
Time: <span id="time">60</span> |
Best: <span id="best">0</span>
</div>

<div class="grid" id="grid"></div>
<button onclick="resetGame()">Restart</button>

<script>
const SIZE=6;
const TYPES=["🐸","🍬","🍓","🍋","🫐","💣"];
let board=[],selected=null,score=0,level=1,time=60,timer;
let best=localStorage.getItem("frogBest")||0;

function randomTile(){
let r=Math.random();
if(r<0.1)return "💣";
return TYPES[Math.floor(Math.random()*5)];
}

function createBoard(){board=[];for(let i=0;i<SIZE*SIZE;i++)board.push(randomTile());}

function drawBoard(hugged=[]){
let grid=document.getElementById("grid");grid.innerHTML="";
board.forEach((tile,i)=>{
let d=document.createElement("div");
let classes="tile";
if(selected===i) classes+=" selected";
if(tile==="💣") classes+=" bomb";
if(hugged.includes(i)) classes+=" hug";

d.className=classes;
d.textContent=tile;
d.onclick=()=>handleClick(i,d);
grid.appendChild(d);
});
updateUI();
}

function updateUI(){
document.getElementById("score").textContent=score;
document.getElementById("level").textContent=level;
document.getElementById("time").textContent=time;
document.getElementById("best").textContent=best;
}

function swap(i,j){[board[i],board[j]]=[board[j],board[i]];}

function laughAnimation(el){
el.classList.add("laugh");
setTimeout(()=>el.classList.remove("laugh"),300);
}

function handleClick(i,el){
if(selected===null){selected=i;}
else{
let diff=Math.abs(selected-i);
if(diff===1||diff===SIZE){
let tiles=document.querySelectorAll(".tile");
laughAnimation(tiles[selected]);
laughAnimation(tiles[i]);

swap(selected,i);
checkMatches();
}
selected=null;
}
drawBoard();
}

function explode(index,matched){
[ index,index-1,index+1,index-SIZE,index+SIZE ].forEach(n=>{
if(board[n]!==undefined)matched.add(n);
});
}

function checkMatches(){
let matched=new Set();

for(let i=0;i<SIZE*SIZE;i++){
if(i%SIZE<=SIZE-3){
let a=board[i];
if(a&&a===board[i+1]&&a===board[i+2]){
matched.add(i);matched.add(i+1);matched.add(i+2);
}
}
if(i<SIZE*(SIZE-2)){
let a=board[i];
if(a&&a===board[i+SIZE]&&a===board[i+2*SIZE]){
matched.add(i);matched.add(i+SIZE);matched.add(i+2*SIZE);
}
}
}

if(matched.size>0){
score+=matched.size*15;

matched.forEach(i=>{
if(board[i]==="🐸"||board[i]==="💣") explode(i,matched);
});

// show hugging before clearing
let hugList=[...matched];
drawBoard(hugList);

setTimeout(()=>{
hugList.forEach(i=>board[i]="");
drop();
setTimeout(checkMatches,250);
},400);
}
}

function drop(){
for(let i=SIZE*SIZE-1;i>=0;i--){
if(board[i]===""){
if(i-SIZE>=0){board[i]=board[i-SIZE];board[i-SIZE]="";}
else board[i]=randomTile();
}
}
}

function startTimer(){
timer=setInterval(()=>{
time--;
if(time<=0){
clearInterval(timer);
if(score>best){best=score;localStorage.setItem("frogBest",best);} 
alert("Game Over! Score: "+score);
}
updateUI();
},1000);
}

function levelUp(){if(score>=level*250){level++;time+=8;}}
function gameLoop(){levelUp();requestAnimationFrame(gameLoop);} 

function resetGame(){
score=0;level=1;time=60;
clearInterval(timer);
createBoard();drawBoard();startTimer();
}

createBoard();drawBoard();startTimer();gameLoop();
</script>

</body>
</html>
